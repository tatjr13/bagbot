enabled: true
dry_run: false

risk_mode_default: aggressive
bar_size_minutes: 15
rebalance_every_minutes: 5
taostats_flow_enabled: true
taostats_refresh_minutes: 10
taostats_flow_day_norm_tao: 500.0
taostats_flow_week_norm_tao: 350.0
taostats_flow_ema_norm_tao: 0.01

# Warmup gates - no adaptive thresholds until enough history
warmup_min_hours: 0
warmup_full_hours: 0
# Confidence gates
# - below freeze_buys_if_confidence_lt: freeze prior thresholds + disable buys
# - below de_risk_only_if_confidence_lt: disable buys, allow only de-risking
freeze_buys_if_confidence_lt: 0.01
de_risk_only_if_confidence_lt: 0.02
trade_only_if_confidence_gte: 0.02

# Edge and slippage
min_roundtrip_edge_pct: 0.02
slippage_limit_pct: 0.005
max_threshold_shift_pct_per_tick: 0.015
max_daily_turnover_ratio: 0.50

# Timing
min_minutes_between_threshold_updates: 5
min_minutes_between_trades_per_subnet: 15

# Pump protection
disable_buys_above_range_pos: 0.85
disable_buys_if_6h_pump_pct: 0.06

# Subnet universe filters
max_live_subnets: 6
new_subnet_min_age_days: 7
min_liquidity_tao: 150
dynamic_max_alpha_tao: 25.0
dynamic_buy_upper_discount_pct: 0.015
dynamic_buy_lower_discount_pct: 0.045
dynamic_sell_lower_premium_pct: 0.020
dynamic_sell_upper_premium_pct: 0.080

# Lookback windows
lookbacks:
  ema_hours: 72
  vol_hours: 24
  range_short_hours: 24
  range_medium_hours: 72
  momentum_short_hours: 6
  momentum_medium_hours: 24
